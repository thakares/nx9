  <!-- Main Logo Text -->
  <text x="470" y="368" font-family="'Montserrat', 'Arial Black', 'Impact', sans-serif" font-size="235" font-weight="900" fill="#000000" letter-spacing="-4">NX9</text>

  <!-- Subtitle -->
  <text x="485" y="400" font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="26" font-weight="700" fill="#000000" letter-spacing="2">OWN YOUR INFRASTRUCTURE.</text>

