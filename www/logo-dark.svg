<svg xmlns="http://www.w3.org/2000/svg" viewBox="145 195 810 215" width="100%" height="100%">
  <!-- Background -->
  
  <g fill="#000000">
    <!-- Server Rack Blades -->
    <!-- Top -->
    <rect x="150" y="200" width="280" height="48" rx="24"/>
    <!-- Middle -->
    <rect x="150" y="260" width="280" height="48" rx="24"/>
    <!-- Bottom -->
    <rect x="150" y="320" width="280" height="48" rx="24"/>

    <!-- Stem -->
    <rect x="278" y="368" width="24" height="18"/>
    
    <!-- Base plate -->
    <rect x="235" y="386" width="110" height="12"/>
    
    <!-- Network Lines -->
    <!-- Left -->
